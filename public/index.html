<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Week 2 API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { color: #d33; }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
    }
    ul { line-height: 1.8; }
  </style>
</head>
<body>
  <h1>My Week 2 API</h1>
  <p>This static page is served from the Express app. Available endpoints:</p>
  <ul>
    <li><code>GET /</code> &mdash; this page</li>
    <li><code>GET /api</code> &mdash; returns "My Week 2 API!"</li>
    <li><code>POST /user</code> &mdash; accepts JSON <code>{ "name": "...", "email": "..." }</code></li>
    <li><code>GET /user/:id</code> &mdash; returns a profile message for the given id</li>
  </ul>
</body>
</html>
